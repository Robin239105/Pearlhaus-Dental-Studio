<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#0D2137"/>

  <!-- Pearl tooth shape: outer white body -->
  <ellipse cx="256" cy="272" rx="110" ry="120" fill="#FFFFFF"/>

  <!-- Tooth root left -->
  <rect x="196" y="350" width="44" height="70" rx="22" fill="#FFFFFF"/>
  <!-- Tooth root right -->
  <rect x="272" y="350" width="44" height="70" rx="22" fill="#FFFFFF"/>

  <!-- Mint highlight gloss (top sheen) -->
  <ellipse cx="230" cy="215" rx="48" ry="28" fill="#2DBD8A" opacity="0.55" transform="rotate(-20 230 215)"/>

  <!-- Tiny pearl highlight dot -->
  <circle cx="218" cy="205" r="10" fill="#FFFFFF" opacity="0.9"/>

  <!-- Subtle crown ridge line -->
  <path d="M174 265 Q220 248 256 256 Q292 264 338 265" stroke="#E2EDE9" stroke-width="5" fill="none" stroke-linecap="round"/>
</svg>